<head>

<style>
  :root{
    --wall-a:#171210; --wall-b:#241b16;
    --ink:#2b2118;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{
    background:
      radial-gradient(120% 90% at 50% 0%, var(--wall-b) 0%, var(--wall-a) 70%),
      var(--wall-a);
    color:#cfc4ae;
    font-family:Georgia,'Iowan Old Style','Palatino Linotype','Book Antiqua',serif;
    display:flex;flex-direction:column;align-items:center;
    padding:2.2rem 1rem 3rem;
  }
  /* wallpaper stripe, very faint */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(90deg, rgba(255,255,255,.012) 0 2px, transparent 2px 26px);
  }
  #pall{
    width:min(760px,96vw);height:54px;position:relative;z-index:2;margin-bottom:-30px;
    background:
      radial-gradient(60% 120% at 20% 0%, rgba(58,26,64,.9), rgba(30,12,34,.95) 70%),
      linear-gradient(180deg,#2c1030,#1a0a1e);
    border-radius:0 0 46% 38% / 0 0 100% 90%;
    box-shadow:0 10px 22px rgba(0,0,0,.55), inset 0 -8px 14px rgba(0,0,0,.5), inset 0 4px 6px rgba(160,120,180,.12);
  }
  #pall::after{
    content:"";position:absolute;left:8%;right:12%;bottom:6px;height:8px;
    background:repeating-linear-gradient(90deg, rgba(197,160,84,.35) 0 7px, transparent 7px 22px);
    filter:blur(.4px);
  }
  #frame{
    width:min(760px,96vw);position:relative;z-index:1;
    padding:26px;
    background:
      linear-gradient(135deg,#6b5426,#c9a44e 18%,#8a6c2e 38%,#d9b866 55%,#7c6128 74%,#b08d3e 92%,#5f4a20);
    border-radius:4px;
    box-shadow:0 22px 60px rgba(0,0,0,.7), inset 0 0 0 2px rgba(46,34,12,.85), inset 0 0 18px rgba(0,0,0,.35);
  }
  #frame::before{
    content:"";position:absolute;inset:9px;pointer-events:none;border-radius:2px;
    border:2px solid rgba(43,31,10,.55);
    box-shadow:inset 0 0 0 3px rgba(255,236,180,.14);
  }
  /* tarnish veil over the gilt, driven by JS */
  #tarnish{position:absolute;inset:0;border-radius:4px;pointer-events:none;background:linear-gradient(135deg,rgba(24,20,12,.85),rgba(40,32,18,.7));opacity:0;transition:opacity 1.4s}
  #canvas{
    position:relative;overflow:hidden;border-radius:1px;
    background:#efe6cf;
    min-height:340px;
    padding:2.4rem 2.6rem 2.6rem;
    box-shadow:inset 0 0 26px rgba(84,62,34,.28);
    transition:background 1.6s;
  }
  /* weave / paint grain */
  #canvas::before{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.55;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/><feComponentTransfer><feFuncA type='linear' slope='0.06'/></feComponentTransfer></filter><rect width='140' height='140' filter='url(%23n)'/></svg>");
  }
  #crack{
    position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 2s;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='c'><feTurbulence type='turbulence' baseFrequency='0.055' numOctaves='4' seed='7' stitchTiles='stitch'/><feColorMatrix type='matrix' values='0 0 0 0 0.22  0 0 0 0 0.16  0 0 0 0 0.10  0 0 0 0.9 -0.28'/></filter><rect width='260' height='260' filter='url(%23c)'/></svg>");
    background-size:260px 260px;
  }
  #vignette{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 1.8s;
    background:radial-gradient(115% 100% at 50% 42%, transparent 42%, rgba(38,26,12,.55) 76%, rgba(22,14,6,.92) 100%);}
  #fleck{
    position:absolute;right:14%;bottom:9%;width:74px;height:60px;pointer-events:none;opacity:0;transition:opacity 2.4s, transform 2.4s;
    background:
      radial-gradient(38% 42% at 46% 52%, rgba(122,16,18,.85), rgba(122,16,18,0) 70%),
      radial-gradient(20% 22% at 68% 34%, rgba(96,10,12,.8), rgba(96,10,12,0) 70%),
      radial-gradient(14% 16% at 30% 30%, rgba(96,10,12,.7), rgba(96,10,12,0) 70%);
    filter:blur(1px);transform:scale(.6);
    mix-blend-mode:multiply;
  }
  #grace{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 3s;
    background:radial-gradient(80% 70% at 50% 30%, rgba(255,244,205,.5), transparent 70%);mix-blend-mode:screen;}
  #inner{position:relative;z-index:3}
  #station{
    font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;
    color:rgba(90,68,40,.85);text-align:center;margin-bottom:1.4rem;
    transition:color 1.6s;
  }
  #chapterhead{
    display:none;text-align:center;font-variant:small-caps;letter-spacing:.2em;
    color:rgba(80,58,32,.9);margin-bottom:1.1rem;font-size:1.02rem;
  }
  #text{color:var(--ink);font-size:1.06rem;line-height:1.72;transition:color 1.6s}
  #text p{margin:0 0 1.05em}
  #text p:last-child{margin-bottom:0}
  #text .q{font-style:italic}
  #text .flash{display:block;margin:.9em 1.6em;font-style:italic}
  .titlepage h1{
    font-weight:normal;text-align:center;font-size:1.85rem;letter-spacing:.05em;margin-bottom:.4rem;color:var(--ink);
  }
  .titlepage .sub{text-align:center;font-style:italic;margin-bottom:.2rem}
  .titlepage .credit{text-align:center;font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(90,68,40,.85);margin-bottom:1.6rem}
  .titlepage hr{border:none;border-top:1px solid rgba(90,68,40,.4);width:38%;margin:1.4rem auto}
  .titlepage .dedication{text-align:center;font-style:italic;letter-spacing:.06em;color:rgba(80,58,32,.9);margin-top:.2rem}
  #finis{display:none;text-align:center;margin-top:2.8rem}
  #finis .fname{font-variant:small-caps;letter-spacing:.24em;font-size:1.3rem;color:var(--ink);margin:.4rem 0 1rem}
  #finis .verdict{font-style:italic;margin-bottom:1.2rem;color:var(--ink)}
  #finis .cmp{text-align:left;color:var(--ink);font-size:1.02rem;line-height:1.7;margin:0 auto 1.4rem;max-width:56ch}
  #finis .cmp p{margin-bottom:.9em}
  #finis .fword{letter-spacing:.5em;font-size:.8rem;color:rgba(90,68,40,.9);margin-bottom:.6rem}
  #choices{
    width:min(760px,96vw);margin-top:1.15rem;display:flex;flex-direction:column;gap:.6rem;align-items:center;
  }
  .card{
    width:100%;max-width:620px;
    background:linear-gradient(180deg,#e9dfc6,#ddd0b1);
    color:#33281c;border:1px solid #8f7443;border-radius:2px;
    box-shadow:0 3px 10px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,250,230,.4);
    padding:.66rem 1rem .7rem;
    font-family:inherit;font-size:.97rem;line-height:1.45;text-align:left;cursor:pointer;
    transition:transform .12s, box-shadow .12s, background .3s;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,250,230,.5)}
  .card:focus-visible{outline:2px solid #d9b866;outline-offset:2px}
  .card.bare{
    background:none;border:none;box-shadow:none;color:#9c8f76;text-align:center;font-style:italic;
  }
  .card.bare:hover{transform:none;color:#c9bb9d}
  footer{margin-top:2.6rem;font-style:italic;font-size:.9rem}
  footer a{color:#8d7f68;text-decoration:none;border-bottom:1px dotted #6b604e}
  footer a:hover{color:#cfc4ae}
  @media (max-width:560px){
    #frame{padding:14px}
    #canvas{padding:1.5rem 1.15rem 1.7rem}
    #text{font-size:1rem}
  }
</style>

<script>
"use strict";

/* ============================== STATE ============================== */
let S;
function freshState(){
  return {
    wish:false, basil:false, mercy:false, poisoned:false, blood:false,
    hunted:false,          // path bookkeeping for station VIII only
    marks:{},              // one-node / short-range texture
    rot:0, fade:0, age:0,  // canvas condition
    divs:[],               // load-bearing divergences: {at, phrase}
    path:[],               // node ids visited
    node:'title'
  };
}
function save(){ try{ localStorage.setItem('dorian-save', JSON.stringify(S)); }catch(e){} }
function loadSave(){ try{ const j=localStorage.getItem('dorian-save'); if(j){ const s=JSON.parse(j); if(s && s.node && s.node!=='title' && NODES[s.node]) return s; } }catch(e){} return null; }
function clearSave(){ try{ localStorage.removeItem('dorian-save'); }catch(e){} }

/* ============================== NODES ==============================
   Node: { st: station-line, text: string|fn(S)->html, choices: fn(S)->[choice], head?: chapter-head }
   Choice: { t: label, go: id|fn(S)->id, canon?:true, bare?:true,
             set?:fn(S), rot?:n, fade?:n, div?: phrase, cond?:fn(S)->bool }
=================================================================== */

const p = (...ps)=>ps.map(x=>`<p>${x}</p>`).join('');

const NODES = {

/* ---------- TITLE ---------- */
title:{
  st:'', text:(s)=>`
    <div class="titlepage">
      <h1>The Picture of Dorian&nbsp;Gray</h1>
      <div class="sub">a game of chapters, after Oscar Wilde</div>
      <div class="credit">from the author’s text of 1891</div>
      ${p(
      `<span class="q">The artist is the creator of beautiful things</span> — so begins the preface of the man who wrote the book, and the man who painted me believed it. I am the portrait. I hung one summer in a studio full of roses; I have hung ever since in a locked room at the top of a house in Grosvenor Square, under a purple pall, keeping the only honest diary in London.`,
      `The book you may have read follows one man down one staircase. I kept the record of every stair he did not take. There is no such thing as a moral or an immoral book; there are only the pages one turns, and the pages one is turned by.`,
      `The reader of a book follows. The reader of this book chooses.`
      )}
      <hr>
      <div class="dedication">for Heike</div>
    </div>`,
  choices:(s)=>{
    const c=[{t:'Draw back the pall, and begin.', go:'n1', canon:true}];
    if(window.__resume) c.push({t:'Return to the picture where you left it.', go:'__resume'});
    return c;
  }
},

/* ================= STATION I — a June afternoon, the studio ================= */
n1:{
  st:'JUNE, 18— · THE STUDIO OF BASIL HALLWARD',
  text:(s)=>p(
    `Roses at the window, the dim roar of London like an organ held down soft. Basil Hallward — a painter with a rugged, honest face, who has put more of himself into me than is quite safe — is at the easel, finishing. On the divan lies Lord Henry Wotton, a married man of unmarried habits, who does nothing whatever and says everything; he has come to look at me and stayed to talk. On the dais stands the sitter: Dorian Gray, little more than a lad though really past twenty, with the look of one whom the world has not yet touched. He is yours now. Basil wants Lord Henry gone before the last sitting; Lord Henry has reached for his hat.`
  ),
  choices:(s)=>[
    {t:'Beg Lord Henry to stay and talk through the sitting.', go:'n2', canon:true, set:x=>x.marks.stay=1},
    {t:'Let Lord Henry go to his man at the Orleans.', go:'n2', set:x=>x.marks.letgo=1},
    {t:'Ask Basil, instead, why he will never exhibit the picture.', go:'n2', set:x=>x.marks.asked=1}
  ]
},
n2:{
  st:'JUNE, 18— · THE GARDEN',
  text:(s)=>p(
    (s.marks.letgo?`Lord Henry did not go; men like him never go when it would be convenient. `:s.marks.asked?`Basil would not answer; Lord Henry answered for him, at length, about everything else. `:``)+
    `The sitting broke for air, and in the garden Lord Henry found the boy alone among the lilacs and gave him the sermon he gives no one twice. <span class="q">“Youth! Youth! There is absolutely nothing in the world but youth!”</span> — and much besides, about the senses curing the soul, about the courage of yielding, about how little time there is. He is the best talker in England, and the bill for his conversation is never sent to his own address. Through the door, Basil can be seen at the easel, mixing white, waiting.`
  ),
  choices:(s)=>[
    {t:'Stay among the lilacs and drink in every word.', go:'n3', canon:true, rot:.02},
    {t:'Go back inside, to Basil and the easel.', go:'n3', set:x=>x.basil=true, div:'in the garden, where his Dorian drank the sermon and yours went back to the easel'},
    {t:'Laugh at Lord Henry, and call the whole sermon a pose.', go:'n3', set:x=>x.marks.laughed=1}
  ]
},
n3:{
  st:'JUNE, 18— · THE UNVEILING',
  text:(s)=>p(
    `Basil wrote his name in vermilion in my corner and stood away. Dorian looked at me — and saw, for the first time, what everyone else had always seen. The pleasure lasted a moment. Then Lord Henry’s sermon did its work, the way a seed does its work, quietly and underneath: <span class="q">the scarlet would pass from his lips and the gold from his hair; I would keep both.</span> A painting is patient. A boy is not. Something rose in him that wanted saying${s.basil?', and something steadier, learned an hour ago at the easel, that did not':''}.`
  ),
  choices:(s)=>{
    const c=[
      {t:'“If it were I who was to be always young, and the picture that was to grow old — I would give my soul for that.”', go:'n3b', canon:true, set:x=>{x.wish=true}, rot:.06},
      {t:'“Why should the picture keep what I must lose? I am jealous of it — let it do the losing.”', go:'n3b', set:x=>{x.wish=true;x.marks.envy=1}, rot:.06},
      {t:'“The picture will mock me one day. Let it grow old instead of me.”', go:'n3b', set:x=>{x.wish=true;x.marks.mock=1}, rot:.06}
    ];
    if(s.basil) c.push({t:'Hold your tongue; look; let it be only paint.', go:'n4', div:'before the finished picture, where his Dorian prayed and yours held his tongue'});
    return c;
  }
},
n3b:{
  st:'JUNE, 18— · THE PALETTE-KNIFE',
  text:(s)=>p(
    `Envy is a prayer said sideways, and this one was heard, though nothing in the room moved. What moved was Basil: stung by the quarrel that followed, he went to the deal table and took up the long palette-knife, meaning to rip me from end to end — better no picture than a picture that had made three friends hate each other in an afternoon.`
  ),
  choices:(s)=>[
    {t:'Tear the knife out of Basil’s hand — “Don’t, Basil! It would be murder!”', go:'n4', canon:true},
    {t:'Let Basil rip the canvas.', go:'n4', set:x=>{x.marks.slashed=1;x.wish=false;x.marks.slashedEver=1}, div:'at the palette-knife, which his Dorian caught and yours let fall'}
  ]
},
n4:{
  st:'JUNE, 18— · TEA',
  text:(s)=> s.marks.slashedEver ?
    p(`Basil cut twice and stopped, sick at himself. I survive in strips, rolled in the Italian chest — a diary with its spine broken, still keeping entries. Tea came in anyway; the English always send tea to an execution. Lord Henry proposed the theatre.`)
    : p(`Tea, on a hissing Georgian urn, and the picture — I — promised to Dorian, varnished and framed and sent home. Lord Henry proposed the theatre; Basil, quietly, proposed dinner instead, and meant: <span class="q">stay</span>.`),
  choices:(s)=>[
    {t:'The theatre to-night, with Lord Henry.', go:'n5', canon:true},
    {t:'Dine quietly with Basil.', go:'n5', set:x=>x.basil=true, div:'over the teacups, where yours dined with the painter'}
  ]
},

/* ================= STATION II — the next day; a month of the Season ================= */
n5:{
  st:'JUNE, 18— · LUNCHEON AT LADY AGATHA’S',
  text:(s)=>p(
    `Next day, luncheon at Lady Agatha’s — Lord Henry’s aunt, a good woman with a passion for the East End, who has been promised a duet. Dorian plays the piano beautifully, and had sworn to play it, last Tuesday, at her club in Whitechapel, before the dockers and their wives; he forgot. Over the quails Lord Henry improvised on folly until the table laughed itself young again, and then stood in the doorway with the whole Season shining behind him like a carriage-lamp. “I am going to the park,” he said. Lady Agatha, gathering her lists, mentioned — gently, the way saints nag — that Whitechapel keeps its promises too.`
  ),
  choices:(s)=>[
    {t:'The park, with Lord Henry.', go:'n6', canon:true, rot:.02},
    {t:'Whitechapel, this afternoon: keep the promise, play the duet.', go:'A1', div:'on the second afternoon, between a park and a promise'},
    {t:'Neither: spend the afternoon at Basil’s studio.', go:'n6', set:x=>x.basil=true, div:'on the second afternoon, when yours chose the studio'}
  ]
},
n6:{
  st:'JULY, 18— · CURZON STREET, A MONTH LATER',
  text:(s)=>p(
    `A month of Lord Henry: dinners, boxes, sentences. <span class="q">“Never marry, Dorian.”</span> The boy came to Curzon Street to say he was in love — with an actress.`
  ),
  choices:(s)=>[
    {t:'Tell Lord Henry everything about the actress, name and all.', go:'n7', canon:true},
    {t:'Keep her name back, and give him only the fact.', go:'n7', set:x=>x.marks.unnamed=1}
  ]
},
n7:{
  st:'JULY, 18— · THE ROYAL THEATRE, HOLBORN',
  text:(s)=>p(
    `Her name is Sibyl Vane. Seventeen; Juliet, three nights a week, in a gilt-and-plaster theatre off Holborn where the manager, one Isaacs, has bankrupted himself five times for Shakespeare and holds her to articles for three years more. Dorian paid a guinea for a box and came back every night for three weeks. She lives with a faded mother and a brother, James, sixteen, rough as she is fine, who sails for Australia within the week and has sworn — the picture records oaths; they mature — that if any gentleman ever wrongs his sister, he will track the man down and kill him like a dog. She calls Dorian <span class="q">Prince Charming</span>. She does not know his name. Last night, in the greenroom, they kissed.`
  ),
  choices:(s)=>[
    {t:'Announce the engagement: telegraph Lord Henry to-night.', go:'n8', canon:true},
    {t:'Write first to Basil, before anyone.', go:'n8', set:x=>x.marks.wroteBasil=1},
    {t:'Press Sibyl to leave the stage at once, articles or no.', go:'n8', set:x=>x.marks.pressed=1}
  ]
},
n8:{
  st:'JULY, 18— · DINNER AT THE BRISTOL',
  text:(s)=>p(
    `Dinner for three at the Bristol: Basil grave, Lord Henry glittering. <span class="q">“Whenever a man does a thoroughly stupid thing, it is always from the noblest motives,”</span> said the one; the other only asked whether the girl was good. To-morrow night they will both be taken to see her act — Juliet, for their judgment. A man in love invites the jury himself, and calls it pride.`
  ),
  choices:(s)=>[
    {t:'Boast of Sibyl’s genius until the coffee comes.', go:'n9', canon:true},
    {t:'Beg Basil to be glad for you.', go:'n9', set:x=>x.marks.begged=1},
    {t:'Apologise for the suddenness of it all.', go:'n9', set:x=>x.marks.apol=1}
  ]
},

/* ================= STATION III — the theatre ================= */
n9:{
  st:'JULY, 18— · THE BOX',
  text:(s)=>p(`The house crowded and hot, the gallery in shirt-sleeves, oranges going round. Isaacs bowing to the velvet. The band scraped. The curtain hung.`),
  choices:(s)=>[
    {t:'Watch the house, and let Lord Henry talk.', go:'n10', canon:true},
    {t:'Watch only the curtain, for her.', go:'n10', set:x=>x.marks.watched=1}
  ]
},
n10:{
  st:'JULY, 18— · THREE ACTS',
  text:(s)=>p(
    `She was lovely, and she was wooden. The balcony speech came out like a lesson beaten into a schoolgirl; the pit whistled; the gallery laughed and left. Lord Henry said she was quite beautiful and quite unable to act, and put on his coat. Basil said she must be ill. Dorian sat white in the box while his two witnesses made for the door, and the third act dragged up its curtain on empty benches.`
  ),
  choices:(s)=>[
    {t:'Sit the play out to the end, alone.', go:'n11', canon:true, rot:.02},
    {t:'Go behind to Sibyl at the interval, before the end.', go:'n11', set:x=>x.marks.interval=1},
    {t:'Leave with Basil and Lord Henry, and come back after.', go:'n11', set:x=>x.marks.leftfirst=1}
  ]
},
n11:{
  st:'JULY, 18— · THE GREENROOM',
  text:(s)=>p(
    `${s.marks.interval?'He went to her before the end, and she met him already shining. ':''}In the greenroom she stood alone with a look of triumph, lit like a saint who has burned her church. She tried to give him the reason as a gift:`,
    `<span class="flash">“Dorian, before I knew you, acting was the one reality of my life. It was only in the theatre that I lived. I believed in everything. You came — oh, my beautiful love! — and you freed my soul from prison. You taught me what reality really is. To-night, for the first time, I saw through the hollowness of the empty pageant in which I had always played… I have grown sick of shadows. You are more to me than all art can ever be. Take me away, Dorian — take me away with you.”</span>`,
    `A man may hear that as a vow, or as a resignation from the only post he hired her for. In the doorway the draught moved the gas, and the little flames bowed, and waited, as I waited, miles off, in a house he had not slept in yet.`
  ),
  choices:(s)=>[
    {t:'“You have killed my love. Without your art, you are nothing.” Leave her there.', go:'n12', canon:true, rot:.10},
    {t:'Take Sibyl out of the theatre to-night, whatever she is on a stage.', go:'n14b', set:x=>{x.mercy=true;x.marks.mercyAway=1}, div:'at the greenroom door, where his Dorian wrote cruelty and yours wrote mercy'},
    {t:'“Then the stage has lost you. Marry me this week.”', go:(x)=> x.basil?'B1':'n14b', set:x=>{x.mercy=true;x.marks.triedMarry=1}, div:'at the greenroom door, where yours proposed marriage to a bad actress'}
  ]
},

/* ================= STATION IV — that night and after ================= */
n12:{
  st:'JULY, 18— · COVENT GARDEN, DAWN',
  text:(s)=>p(`He walked it off till morning. Carts of nodding lilies in the polished empty street; a carter gave him cherries, plucked at midnight, cold with the moon. Then home.`),
  choices:(s)=>[
    {t:'Look at the picture before sleeping.', go:'n13', canon:true, set:x=>x.marks.sawTonight=1},
    {t:'Sleep, and see nothing till noon.', go:'n13'}
  ]
},
n13:{
  st:'JULY, 18— · THE MORNING FACE',
  text:(s)=> s.wish ? p(
    (s.marks.sawTonight?
      `In the dawn light he found it: a line at my mouth that Basil never painted. `:
      `Past noon he rose, and idling by my frame he found it: a line at my mouth that Basil never painted. `)+

n14:{
  st:'JULY, 18— · LORD HENRY AT THE DOOR',
  text:(s)=> s.marks.euston ?
    p(`The blinds in the Euston Road were drawn. Sibyl Vane had swallowed something from the property-room before one in the morning — prussic acid or white lead; the coroner would choose — while he was still walking among the lilies. Whatever the letter-writers of this world believe, amends keep no earlier hours than the post. He came home to find Lord Henry’s note unopened on the tray and Lord Henry himself on the step, arranging the tragedy into an epigram before his hat was off: <span class="q">the girl had never really lived, and so she had never really died.</span>`)
    :
    p(`His letter lay finished and felt like absolution. On the tray, unopened, a note from Lord Henry; on the stair, before it could be read, Lord Henry’s own voice. The news came standing: Sibyl Vane had swallowed something from the property-room before one in the morning — while her Romeo was walking home through the flowers, being forgiven by himself. Lord Henry stayed an hour, and was kind the way a surgeon is quick: <span class="q">“Don’t waste your tears over Sibyl Vane. She was less real than they are… A wonderful ending to a wonderful play.”</span> Patti was singing that night; his sister had a box; he proposed it the way one proposes medicine.`),

n14b:{
  st:'JULY, 18— · THE MORNING AFTER MERCY',
  text:(s)=>p(
    `Sibyl Vane woke alive, which the other book never allowed her. ${s.marks.triedMarry?'The word <i>marriage</i> had been said aloud in a greenroom, and words said aloud acquire creditors. ':''}By noon the objections had formed a queue: the guardians (Lord Radley, apoplectic by post), the articles to Isaacs, and — smiling at the head of the queue, hat in hand — Lord Henry, who came to be charming about it. <span class="q">“Men marry because they are tired; women, because they are curious: both are disappointed.”</span> He was never wittier than when unpicking a good intention; the stitches came away one dinner at a time.`

  choices:(s)=>{

n15:{
  st:'AUGUST, 18— · BASIL’S VISIT',
  text:(s)=> s.mercy ?
    p(
      `The engagement did not survive the Season; it was not broken, it evaporated, which leaves no pieces to pick up and no one to blame, and that is why it is the favourite method of the well-bred. Sibyl Vane went back to the provinces with her mother, alive, employed, and unexplained. Basil came round when it was over — relieved, and ashamed of the relief. He asked Dorian to sit again; refused, he confessed instead, in a rush he regretted while it was still leaving him: the idolatry, the fear of showing me to the world, the too-much-of-himself in every flake of my paint. Wilde gave that speech no name, and neither shall I; it was love, and it was told to the one man in London who could only be flattered by it.`
    )
    :
    p(
      `Basil came the morning after the inquest made the papers, heart-broken, and found a boy discussing Patti. The reproach failed; the request that followed failed better. He wanted me for his Paris exhibition — Georges Petit, the Rue de Sèze, October — and Dorian, white to the lips, wanted to know first why a man paints a thing and then hides it. So Basil confessed: the idolatry, the fear that every flake of my paint showed his secret, the too-much-of-himself. Wilde gave that speech no name, and neither shall I; it was love, told to the one man in London who could only be flattered by it.${s.wish?' Nobody looked behind the screen. Everybody thought about it.':''}`
    ),
  choices:(s)=> s.mercy ? [
    {t:'Hear Basil’s confession out, and promise him nothing.', go:'n17', canon:true},
    {t:'Promise Basil you will sit for him again — and mean it as a kindness.', go:'n17', set:x=>x.marks.promised=1},
    {t:'Tell Basil about the studio afternoon, wish and all.', go:'n17', set:x=>x.marks.toldBasil=1}
  ] : [
    {t:'Refuse the exhibition; keep Basil’s confession like a coin.', go:(x)=>x.wish?'n16':'n17', canon:true, rot:.02},
    {t:'Refuse everything, coldly, and let the friendship take the wound.', go:(x)=>x.wish?'n16':'n17', set:x=>x.marks.coldBasil=1},
    {t:'Move the screen an inch — and stop, and cover it again.', go:(x)=>x.wish?'n16':'n17', set:x=>x.marks.almost=1, cond:x=>x.wish}
  ]
},
n16:{
  st:'AUGUST, 18— · THE OLD SCHOOLROOM',
  text:(s)=>p(
    `Mrs. Leaf, the housekeeper, gave up the key under protest: the old schoolroom at the top of the house, locked since his grandfather Kelso died — dust, the Italian chest he hid in as a boy, a tapestry king and queen at their endless chess; the room where a loveless old man had kept a beautiful daughter’s child out of sight. Now the child stood in the hall with the key in one hand, while the frame-maker’s men waited beside a purple-and-gold pall that had lain, once, over the dead. The question before the house was where a man buries a live thing.`
  ),

/* ================= STATION V — the years ================= */
n18:{
  st:'18— TO 18— · THE YEARS, IN ONE SWEEP',
  text:(s)=>{
    const opener = s.poisoned
      ? `For years he could not free himself from that book, and did not try. `
      : `He had refused the book, which surprised the sender; the Season supplied its arguments anyway, in serial form. `;
    const mercyline = (s.mercy && s.wish)
      ? `The first change I recorded came in the second year — I shall not say over whom; the newspapers of that world only hint, and I keep their discipline — and after the first, the hand wrote faster. By then I too had been carried upstairs, quietly, between trains. `
      : ``;
    const selbyline = s.marks.selbyAttic
      ? `(The Selby experiment lasted one winter: he could not sleep with me ninety miles away and a door he could not check, and had me carried back up the old stairs to the schoolroom.) `
      : ``;
    const nowish = (!s.wish)
      ? `Understand my position in these years: the wish had ${s.marks.slashedEver?'died on a palette-knife':'never been said'}, so the years wrote on the man, as is customary, and left me merely out of date. What follows I watched the way any portrait watches — from behind the face of a younger stranger.`
      : `${selbyline}He collected — jewels, embroideries, vestments, perfumes, instruments; a chapter of treasures in the other book — and I kept the only inventory that mattered. London began to whisper. Men who talked grossly fell silent when he came in; women who had adored him grew pallid when he passed; and always the face answered for him, twenty years old, unspotted, a receipt for goods never delivered.`;
    return p(opener + mercyline, nowish);
  },
  choices:(s)=>[

n21:{

  text:(s)=>p(
    `Fog, and eleven o’clock, and home from Lord Henry’s. On the pavement by Grosvenor Square a man passed him walking fast, grey ulster, bag in hand: Basil Hallward — the painter; my maker; older now — bound for Paris by the midnight train, and come first, all evening, to say something that had been nine years rising. The fog held them apart a moment longer, like a curtain unsure of its cue.`
  ),
  choices:(s)=>[

  ]
},
n22:{
  st:'THE NINTH OF NOVEMBER · THE LIBRARY',
  text:(s)=>p(
    `Half an hour, Basil said, and it took less: the charges, name by name, laid out like surgical instruments — Berwick’s back, Staveley’s sneer, the boy in the Guards, Ashton, Singleton, Kent’s son, the Perth boy; the women; the houses a man is seen leaving at dawn. <span class="q">“I want a plain answer, Dorian. Deny them. Can’t you see what I am going through?”</span> He did not believe a word he was repeating. That was the unforgivable part: he wanted to be lied to, by a face he had painted, and the face was still good for it.`,
    `<span class="q">“Sin is a thing that writes itself across a man’s face,”</span> said the man who had never seen my ledger. Upstairs, I waited to be introduced.`
  ),
  choices:(s)=> s.wish ? [

n23:{
  st:'THE NINTH OF NOVEMBER · THE SCHOOLROOM',
  text:(s)=>p(
    `He carried the lamp himself. The pall came off, and Basil Hallward looked at me for the first time in nine years, and I watched my maker learn what I had been used for.`,
    `<span class="flash">“Christ! what a thing I must have worshipped! It has the eyes of a devil… This is the face of a satyr.” — “It is the face of my soul.”</span>`,
    `He held the candle to my corner and found his own name in vermilion. Then the painter did the one thing the wit downstairs could never have done: he dropped to the rickety chair and asked for a prayer. <span class="q">“Isn’t there a verse somewhere — ‘Though your sins be as scarlet, yet I will make them as white as snow’?”</span> On the painted chest between them, where it had been left some days before to cut a cord, lay a knife.`
  ),
  choices:(s)=>[

n23c:{

  text:(s)=>p(
    `They knelt on the dusty boards, the painter and the sitter, and said the schoolroom words in the schoolroom. I am obliged to record what I have never recorded before or since: something in my surface <i>stirred</i> — a thinning at the mouth, the way varnish gives before it lifts. Not much. A creditor’s nod. Basil missed his train and stayed the night, and by the grey of morning they had agreed on the terms, which were everything: the truth told, the names owned, me shown — witnesses, lawyers, the world’s slow teeth. Grace is not a reprieve. It is a harder sentence, served in daylight.`
  ),
  choices:(s)=>[

n24:{
  st:'THE NINTH OF NOVEMBER · TWENTY MINUTES TO TWO',
  text:(s)=>p(
    `Done in a minute, and quiet: the vein behind the ear, the head pressed to the table, the drip on the threadbare carpet. What remained of nine years of friendship sat at my table with bowed head and long fantastic arms, and I stood over it, since no one closed my eyes. He went down, rang his own bell, established his alibi with a sleepy valet, and sat in the library counting evidence. Basil was supposed to be in Paris. Nobody had seen him come in. Months, perhaps, before anyone asked. On the shelf, the Blue Book; in it, an address: <span class="q">Alan Campbell, 152, Hertford Street</span> — a chemist of genius, once an inseparable friend, five years estranged, and the one man in London who owed him a fear.`
  ),
  choices:(s)=>[
    {t:'Send for Alan Campbell in the morning.', go:'n25', canon:true},
    {t:'The boat-train from Victoria, to-night, and never come back.', go:'C1', div:'on the night of the ninth, between a chemist and a boat-train'},
    {t:'Walk to the station-house in the fog and give himself up.', go:'E5law', div:'on the night of the ninth, when yours walked to the station-house'}
  ]
},
n25:{
  st:'THE TENTH OF NOVEMBER · ALAN CAMPBELL',
  text:(s)=>p(
    `Campbell came pale and stayed cold. He refused, as an honest man refuses — flatly, twice, with contempt for sauce. Then Dorian wrote a few words on a folded paper and pushed it across the table, and the honest man read it and aged in front of me, so to speak; I know the look. What was on the paper the record does not hold, and I decline to invent what Wilde declined to write. Campbell sat with his face in his hands, not yet risen, not yet gone for his chest of chemicals; the paper lay between them, still retrievable, the way a trigger is retrievable before it is pulled.`
  ),
  choices:(s)=>[
    {t:'Hold Campbell to the folded paper, and wait downstairs while he works.', go:'n26', canon:true, rot:.04, set:x=>x.marks.campbellDone=1},
    {t:'Take the paper back — spare Campbell, and catch the boat-train instead.', go:'C1', div:'at Alan Campbell’s refusal, which yours accepted'}
  ]
},
n26:{
  st:'NOVEMBER, 18— · LADY NARBOROUGH’S',
  text:(s)=>{
    if(s.blood) return p(`The smell of nitric acid kept the schoolroom a week; the thing at the table was gone by dusk; Alan Campbell had been saved from ruin in the way that ruins. And dinner at Lady Narborough’s went on as dinners do: exquisitely dressed, Parma violets in the button-hole, and nothing eaten, plate after plate. <span class="q">“You are quite out of sorts to-night, Dorian,”</span> said Lord Henry, who notices everything and suspects nothing useful.`);
    const basilclause = s.marks.passed ? `Basil was in Paris by then, painting, unanswered questions packed in the Gladstone bag; he wrote twice.` :
      s.marks.denied ? `Basil was in Paris by then, carrying his plain answer, which had been a lie.` :
      s.marks.turnedOut ? `Basil was in Paris by then, carrying the truth, which is heavier.` :
      s.marks.faltered ? `Basil waited out the promised week in Paris; the week has a way of renewing itself.` :
      s.marks.ashPrayer ? `Basil was in Paris by then; the prayer had come out as ash, and he had taken the morning train with the taste of it.` :
      s.marks.confessedPlain ? `Basil was in Paris by then, carrying a plain confession he had no way to test, which is a cruel parcel.` : ``;
    return p(`Dinner at Lady Narborough’s, the Season’s machinery turning. ${basilclause} At table, ennui wore violets. <span class="q">“You are quite out of sorts to-night, Dorian,”</span> said Lord Henry, accurately, as always, about the surface.`);
  },

n27:{
  st:'NOVEMBER, 18— · THE DEN BY THE RIVER',
  text:(s)=>p(
    `Midnight, a hansom, a sovereign for speed, and the streets like the black web of some sprawling spider. In a den by the docks, among the twisted sleepers, he found Adrian Singleton — the boy from the whispered list, the one who signed what he shouldn’t, ruined young and politely; his brother pays, his friends don’t speak. <span class="q">“As long as one has this stuff, one doesn’t want friends,”</span> said Adrian, and lit the pipe. ${s.blood?'There are dens where the memory of old sins can be destroyed by the madness of sins that are new; that was the prescription, and he had come to have it made up.':'Habit had brought him; habit is the only host that never cancels.'}`
  ),

n28:{
  st:'NOVEMBER, 18— · THE ARCHWAY',
  text:(s)=>p(
    `A woman’s voice behind him laughed out the old pet name — <span class="q">Prince Charming</span> — and in the archway a hand took his throat and a revolver came level with his head. James Vane: Sibyl’s brother, the sailor, sixteen when he swore in a shabby parlour to kill the man who wronged her, thirty-four now, and back from every sea with the oath still in working order. Eighteen years he has hunted a name that was never a name. <span class="q">“Make your peace with God, for to-night you are going to die.”</span>`,
    s.wish
      ? `Under the gaslamp there was one card left to play, and it was my card: the face I have been keeping smooth for him since July of 18—.`
      : `Under the gaslamp there was no card left to play. The face had kept the years’ books faithfully, as faces do when nobody has arranged otherwise, and eighteen years were legible in it to a man who could not read.`
  ),
  choices:(s)=> s.wish ? [
    {t:'“Set me under the lamp and look at my face. Your man would be forty.”', go:'n29', canon:true, set:x=>x.hunted=true, rot:.02},

    {t:'Offer James Vane every sovereign in London.', go:'n29', set:x=>{x.hunted=true;x.marks.gold=1}}
  ] : [

n29:{
  st:'NOVEMBER, 18— · THE WORD AT THE CORNER',
  text:(s)=> s.hunted ?
    p(`${s.marks.gold?'The purse was struck aside — that family was never for sale — but the lamp did its work: ':''}the boy’s face acquitted him, and the brother reeled away sick at his own hands. Then the woman from the bar reached the corner first. <span class="q">“It’s nigh on eighteen years since Prince Charming made me what I am… He hasn’t changed much since then. I have, though.”</span> I never saw that meeting; I record it as the coroner records weather. James Vane began to walk west.`)

n30:{
  st:'WINTER, 18— · SELBY ROYAL, THE CONSERVATORY',
  text:(s)=>{
    const glass = s.hunted
      ? `And then, pressed against the conservatory glass like a white handkerchief, a face: the sailor’s. He dropped where he stood, and was carried to a sofa, and lied about it beautifully at dinner.`
      : (s.blood
        ? `Lord Henry, reaching for effect over the teacups, said he should like to know someone who had committed a real murder; and our host went grey and held the table-edge, and lied about it beautifully at dinner.`

/* ============================== ENGINE ============================== */

const $ = id=>document.getElementById(id);

function paint(){
  // canvas condition from rot / fade / age
  const rot = Math.min(1, S.rot), fade = Math.min(1, S.fade);
  const stIdx = S.path.length;
  const age = Math.min(1, stIdx/40);
  // base colour: ivory -> aged -> (fade: pale ground)
  const mix=(a,b,t)=>a.map((v,i)=>Math.round(v+(b[i]-v)*t));
  let bg = mix([239,230,207],[209,189,148], Math.max(rot*.78, age*.25));
  bg = mix(bg,[236,231,219], fade*.8);
  let ink = mix([43,33,24],[26,18,10], rot*.5);
  ink = mix(ink,[132,124,110], fade*.85);
  $('canvas').style.background = `rgb(${bg.join(',')})`;
  $('text').style.color = `rgb(${ink.join(',')})`;
  document.querySelectorAll('#finis .fname,#finis .verdict,#finis .cmp').forEach(e=>e.style.color=`rgb(${ink.join(',')})`);
  $('vignette').style.opacity = (rot*.8).toFixed(2);
  $('crack').style.opacity = (rot*.52).toFixed(2);
  $('tarnish').style.opacity = (Math.max(rot*.55, fade*.35)).toFixed(2);
  const fl = S.blood ? Math.min(1,(rot-.45)*1.6) : Math.max(0,(rot-.62)*1.4);
  $('fleck').style.opacity = Math.max(0,fl).toFixed(2);
  $('fleck').style.transform = `scale(${(0.6+Math.max(0,fl)).toFixed(2)})`;
  $('grace').style.opacity = S.marks && S.marks.__grace ? .85 : 0;
}

function render(id){
  S.node=id; save();
  const n = NODES[id];
  $('finis').style.display='none'; $('text').style.display='block';
  $('station').textContent = n.st||'';
  const ch=$('chapterhead');
  if(n.head){ ch.style.display='block'; ch.textContent=n.head; } else ch.style.display='none';
  $('text').innerHTML = (typeof n.text==='function')?n.text(S):n.text;
  const box=$('choices'); box.innerHTML='';
  n.choices(S).forEach(c=>{
    if(c.cond && !c.cond(S)) return;
    const b=document.createElement('button');
    b.className='card'+(c.bare?' bare':'');
    b.innerHTML=c.t;
    b.onclick=()=>choose(c);
    box.appendChild(b);
  });
  paint();
  window.scrollTo({top:0,behavior:'smooth'});
}

function choose(c){
  if(c.go==='__resume'){ const sv=loadSave(); if(sv){ S=sv; render(S.node); } return; }
  if(c.set) c.set(S);
  if(c.rot) S.rot=Math.min(1,S.rot+c.rot);
  if(c.fade) S.fade=Math.min(1,S.fade+c.fade);
  if(c.div && !c.canon) S.divs.push({at:S.node, phrase:c.div});
  S.path.push(S.node);
  const dest = (typeof c.go==='function')?c.go(S):c.go;
  if(ENDINGS[dest]) renderEnding(dest); else render(dest);
}

function renderEnding(id){
  const e=ENDINGS[id];
  S.node='__end'; clearSave();
  if(id==='E6'){ S.marks.__grace=1; S.rot=Math.max(0,S.rot-.5); }
  if(id==='E1'||id==='E1fire'){ S.rot=1; }
  $('station').textContent='';
  $('chapterhead').style.display='none';
  $('text').style.display='block';
  $('text').innerHTML = e.body(S);
  const f=$('finis'); f.style.display='block';
  f.querySelector('.fname').textContent = e.name + (e.sub?' '+e.sub:'');
  f.querySelector('.verdict').textContent = e.verdict(S);
  f.querySelector('.cmp').innerHTML = e.cmp(S);
  const box=$('choices'); box.innerHTML='';
  const b=document.createElement('button');
  b.className='card'; b.style.textAlign='center';
  b.innerHTML='begin again';
  b.onclick=()=>{ S=freshState(); window.__resume=false; render('title'); };
  box.appendChild(b);
  paint();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ============================== BOOT ============================== */
S=freshState();
window.__resume = !!loadSave();
render('title');
</script>
